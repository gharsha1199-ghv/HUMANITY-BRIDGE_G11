    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const carousel = document.querySelector('.carousel-viewport');
            const cards = document.querySelectorAll('.impact-card-wrapper');

            // Scroll to the middle card initially
            const centerCardIndex = 1; // 2nd card (index 1)
            const cardWidth = 400; // Approximate card width + margin
            carousel.scrollLeft = cardWidth * centerCardIndex;

            const options = {
                root: carousel,
                // These margins define a narrow "center zone" in the scroll container
                // Only the element exactly in the middle will trigger
                rootMargin: '0px -40% 0px -40%',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('center-active');
                    } else {
                        entry.target.classList.remove('center-active');
                    }
                });
            }, options);

            cards.forEach(card => observer.observe(card));
        });








const month = document.getElementById("month");
const dates = document.getElementById("dates");

let date = new Date();

function renderCalendar(){

    const year = date.getFullYear();
    const monthIndex = date.getMonth();

    const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
    ];

    month.innerText = months[monthIndex] + " " + year;

    const firstDay = new Date(year, monthIndex, 1).getDay();
    const lastDate = new Date(year, monthIndex + 1, 0).getDate();

    dates.innerHTML = "";

    for(let i=0;i<firstDay;i++){
        dates.innerHTML += "<div></div>";
    }

    for(let i=1;i<=lastDate;i++){

        const today = new Date();
        let className = "";

        if(
            i === today.getDate() &&
            monthIndex === today.getMonth() &&
            year === today.getFullYear()
        ){
            className="today";
        }

        dates.innerHTML += `<div class="${className}">${i}</div>`;
    }

}

document.getElementById("prev").onclick = ()=>{
    date.setMonth(date.getMonth()-1);
    renderCalendar();
};

document.getElementById("next").onclick = ()=>{
    date.setMonth(date.getMonth()+1);
    renderCalendar();
};

renderCalendar();
