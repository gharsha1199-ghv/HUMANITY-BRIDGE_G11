    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const carousel = document.querySelector('.carousel-viewport');
            const cards = document.querySelectorAll('.impact-card-wrapper');

            // Scroll to the middle card initially
            const centerCardIndex = 1; // 2nd card (index 1)
            const cardWidth = 400; // Approximate card width + margin
            carousel.scrollLeft = cardWidth * centerCardIndex;

            const options = {
                root: carousel,
                // These margins define a narrow "center zone" in the scroll container
                // Only the element exactly in the middle will trigger
                rootMargin: '0px -40% 0px -40%',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('center-active');
                    } else {
                        entry.target.classList.remove('center-active');
                    }
                });
            }, options);

            cards.forEach(card => observer.observe(card));
        });
    </script>
