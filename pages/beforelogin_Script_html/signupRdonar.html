<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanity Bridge | RegularDonor SignUp</title>
    <link rel="stylesheet" href="../Style_css/signupRdonar.css">
  <link rel="stylesheet" href="../../zheaderfooter/footer.css"/>
  <link rel="stylesheet" href="../../zheaderfooter/header.css" />
    <link rel="shortcut icon" href="../../zimages/faviconlogo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="header">
        <div class="container nav">
            <div class="logo">
                <img src="../../zimages/projectlogo.png" alt="logo">
                <span>Humanity Bridge</span>
            </div>

<div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav>
        <a href="../../index.html">Home</a>
                <a href="about_pg.html">About</a>
                <a href="ourwork_pg.html">Our work</a>
                <a href="gallery_pg.html">Gallery</a>
                <a href="login_pg.html" class="login-btn">Login / SignUp</a>
            </nav>
        </div>
    </header>

    <section class="signup-wrapper">
        <div class="signup-card">

            <div class="card-header">
                <div class="card-logo">
                    <img src="../../zimages/projectlogo.png" alt="Logo">
                    <h3>Humanity Bridge</h3>
                </div>
                <h2>Create Your Account</h2>
                <p>Join us in making a difference through responsible giving.</p>
            </div>

            <form class="signup-form">

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Name" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-shop"></i>
                    <select required>
                        <option value="" disabled selected>Select Type</option>
                        <option value="hotel">Hotel</option>
                        <option value="restaurant">Restaurant</option>
                        <option value="hall">Function Hall</option>
                    </select>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" placeholder="Phone / Email" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-location-dot"></i>
                    <input type="text" placeholder="City" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-map-pin"></i>
                    <input type="text" placeholder="Area / Pincode" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="submit-btn">Sign Up</button>
                <p>Already have an account? <a href="login_pg.html">Login</a></p>

            </form>

        </div>
    </section>

    <footer>
        <p>© 2026 Humanity Bridge. All Rights Reserved.</p>
    </footer>

    <script src="../../zheaderfooter/nav.js"></script>
</body>

</html>
