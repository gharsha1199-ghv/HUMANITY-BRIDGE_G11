<!-- another colors -->
 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Color Palette Preview</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #F6F4EF;
        }

        .palette {
            display: flex;
            height: 100vh;
        }

        .color-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            padding: 20px;
        }

        .primary {
            background: #2F8F83;
            color: #ffffff;
        }

        .accent {
            background: #F4A261;
            color: #2E2E2E;
        }

        .background {
            background: #F6F4EF;
            color: #2E2E2E;
            border: 2px solid #ddd;
        }

        .text {
            background: #2E2E2E;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="palette">
    <div class="color-box primary">
        Primary Brand<br>
        #2F8F83
    </div>

    <div class="color-box accent">
        Accent Color<br>
        #F4A261
    </div>

    <div class="color-box background">
        Background<br>
        #F6F4EF
    </div>

    <div class="color-box text">
        Text Color<br>
        #2E2E2E
    </div>
</div>

</body>
</html>
