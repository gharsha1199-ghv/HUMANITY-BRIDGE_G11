<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humanity Bridge | Donor Home</title>
  <link rel="stylesheet" href="../Style_css/style.css" />
  <link rel="shortcut icon" href="../../zimages/faviconlogo.jpeg" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <header class="header">
    <div class="logo">
      <img src="../../zimages/projectlogo.png" alt="Humanity Bridge Logo">
      <span>Humanity Bridge</span>
    </div>

    <nav class="nav">
      <a class="active" href="home_pg.html">Home</a>
      <a href="about_pg.html">About</a>
      <a href="ourwork_pg.html">Our Work</a>
      <a href="gallery_pg.html">Gallery</a>
      <a href="../../BEFORE-LOGIN-humanity-bridge/Script_html/login_pg.html">Login</a>
      <a href="../../BEFORE-LOGIN-humanity-bridge/Script_html/signup1.html">Sign Up</a>
    </nav>
  </header>

  <section class="main">
    <div class="left">
      <h1>Donate Food Responsibly</h1>
      <p>Help reduce food waste while ensuring safe and dignified distribution.</p>
    </div>

    <div class="right">
      <div class="card">
        <form>
          <div class="form-block">
            <h3>Type of Food</h3>
            <div class="row-check">
              <label class="check"><input type="radio" name="foodType"> <span>Packed / Sealed Food</span></label>
              <label class="check"><input type="radio" name="foodType"> <span>Raw Ingredients</span></label>
            </div>
          </div>

          <div class="form-block">
            <h3>Food Category</h3>
            <select>
              <option>Select</option>
              <option>Vegetarian</option>
              <option>Non-Vegetarian</option>
              <option>Mixed</option>
            </select>
          </div>

          <div class="form-block">
            <h3>Donor Details</h3>
            <div class="grid-2">
              <input type="text" placeholder="Donor Name">
              <input type="tel" placeholder="Phone Number">
            </div>
            <div class="grid-2 mt-10">
              <input type="email" placeholder="Email (optional)">
              <input type="text" placeholder="City">
            </div>
          </div>

          <div class="form-block">
            <h3>Quantity of Food</h3>
            <div class="grid-2">
              <input type="number" placeholder="Quantity">
              <input type="text" value="Select food type first" readonly>
            </div>
          </div>

          <a href="formsubmit.html"><button type="button" class="submit-btn">Donate Food Responsibly</button></a>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Humanity Bridge. All Rights Reserved.</p>
  </footer>
</body>

</html>
